<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="list-movies-title">
        <h1>My Movie App</h1>
    </div>
    <main class="content">
        <ol class="movie-grid">
                    <li>
            <div class="movie">
                <a class="movie-poster-link" href="https://www.imdb.com/title/tt0371746/" target="_blank" rel="noopener noreferrer">
                <div class="movie-poster-wrap">
                <img class="movie-poster" src="https://m.media-amazon.com/images/M/MV5BMTczNTI2ODUwOF5BMl5BanBnXkFtZTcwMTU0NTIzMw@@._V1_SX300.jpg" alt="Iron Man">
                <div class="movie-note">Love this movie</div>
                </div>
                </a>
                <div class="movie-title">Iron Man</div>
                <div class="movie-country"><img class="movie-flag" src="https://flagcdn.com/w320/um.png" alt="United States flag" loading="lazy"></div>
                <div class="movie-year">2008</div>
                <div class="movie-rating">★ 7.9</div>
            </div>
        </li>

                <li>
            <div class="movie">
                <a class="movie-poster-link" href="https://www.imdb.com/title/tt2278388/" target="_blank" rel="noopener noreferrer">
                <div class="movie-poster-wrap">
                <img class="movie-poster" src="https://m.media-amazon.com/images/M/MV5BMzM5NjUxOTEyMl5BMl5BanBnXkFtZTgwNjEyMDM0MDE@._V1_SX300.jpg" alt="The Grand Budapest Hotel">
                
                </div>
                </a>
                <div class="movie-title">The Grand Budapest Hotel</div>
                <div class="movie-country"><img class="movie-flag" src="https://flagcdn.com/w320/um.png" alt="United States flag" loading="lazy"></div>
                <div class="movie-year">2014</div>
                <div class="movie-rating">★ 8.1</div>
            </div>
        </li>

                <li>
            <div class="movie">
                <a class="movie-poster-link" href="https://www.imdb.com/title/tt0093936/" target="_blank" rel="noopener noreferrer">
                <div class="movie-poster-wrap">
                <img class="movie-poster" src="https://m.media-amazon.com/images/M/MV5BYzhjZjlhYjYtNjhmOS00ZDNhLWFjNzktMWQ5N2ZkMGM1NTBlXkEyXkFqcGc@._V1_SX300.jpg" alt="The Secret of My Success">
                
                </div>
                </a>
                <div class="movie-title">The Secret of My Success</div>
                <div class="movie-country"><img class="movie-flag" src="https://flagcdn.com/w320/um.png" alt="United States flag" loading="lazy"></div>
                <div class="movie-year">1987</div>
                <div class="movie-rating">★ 6.5</div>
            </div>
        </li>
        </ol>
    </main>
</body>
</html>
